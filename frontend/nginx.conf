server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Match the backend's MAX_UPLOAD_MB=100 so large report uploads are not rejected here.
    client_max_body_size 100m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API → backend (same-origin, so the browser never needs CORS).
    location /api/v1 {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # extraction can take tens of seconds
    }

    # Hashed build assets — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA client-side routing — everything else falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
