# Render blueprint — backend (Node + bundled opendataloader-pdf CLI) + managed Postgres.
# Frontend deploys separately on Vercel (see frontend/vercel.json + docs/DEPLOYMENT.md §"Split deploy").
#
# Deploy: Render Dashboard → New → Blueprint → pick this repo. Then set CORS_ORIGIN
# to your Vercel domain in the backend service's Environment tab.

services:
  - type: web
    name: ncism-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # JVM (extraction) + Node need headroom for 20–50-page PDFs — starter/512MB can OOM.
    plan: standard
    healthCheckPath: /api/v1/health
    # Run migrations before each release goes live (pg-boss creates its own schema at boot).
    preDeployCommand: npm run db:migrate
    # Persistent disk for uploaded reports + job artifacts (temp/). Without this the
    # in-app PDF viewer / Documents tab breaks after a restart.
    disk:
      name: ncism-jobs
      mountPath: /app/temp
      sizeGB: 5
    envVars:
      - key: PORT
        value: "3000"
      - key: EXTRACTION_MODE
        value: fast
      - key: OPENDATALOADER_CLI_PATH
        value: /opt/odl/bin/opendataloader-pdf
      - key: KEEP_JOBS
        value: "true"
      - key: MAX_UPLOAD_MB
        value: "100"
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong secret automatically
      - key: DATABASE_URL
        fromDatabase:
          name: ncism-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false                  # set to https://<your-app>.vercel.app in the dashboard

databases:
  - name: ncism-db
    databaseName: ncism
    user: ncism
    plan: basic-256mb
